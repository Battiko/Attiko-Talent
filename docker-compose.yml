services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: attiko_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: attiko
      POSTGRES_PASSWORD: attiko_dev
      POSTGRES_DB: attiko_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attiko -d attiko_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: attiko_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: attiko_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://attiko:attiko_dev@postgres:5432/attiko_dev
      REDIS_URL: redis://redis:6379
      PORT: 4000
    env_file:
      - .env.local
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro

volumes:
  postgres_data:
  redis_data:
